name: Python package

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 scrapers/ utils/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 scrapers/ utils/ --count --max-line-length=120 --statistics --exit-zero

      - name: Verify scrapers are importable
        run: |
          python -c "import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('scrapers').rglob('*.py'):
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          for f in pathlib.Path('utils').rglob('*.py'):
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors: print(e)
              sys.exit(1)
          print(f'All files pass syntax check')
          "
